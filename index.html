<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibnime · Anime & Karakter A-Z</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 50%, #228B22 100%);
            padding: 15px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #ff9800, 0 0 40px #ff5722;
        }

        .alphabet-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.1);
        }

        .letter-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter-btn:hover {
            background: #ff9800;
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff9800;
        }

        .letter-btn.active {
            background: #ff5722;
            box-shadow: 0 0 25px #ff5722;
        }

        .menu-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            flex-wrap: wrap;
        }

        .menu-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
        }

        .menu-btn:hover {
            background: rgba(255, 152, 0, 0.6);
            transform: translateY(-2px);
        }

        .menu-btn.active {
            background: #ff9800;
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.4);
        }

        .content {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .anime-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .anime-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .anime-btn:hover {
            background: #4CAF50;
            transform: scale(1.05);
        }

        .characters-container {
            margin-top: 20px;
        }

        .characters-title {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: inline-block;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .character-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .character-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 152, 0, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .character-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 10px;
            object-fit: cover;
            display: block;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #ff9800, #ff5722);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .character-name {
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .section-title {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <div class="logo">✦ Vibnime ✦</div>
            <p style="color: #fff; margin-top:5px;">Klik judul anime untuk melihat karakter</p>
        </div>

        <div class="alphabet-nav" id="alphabetNav"></div>

        <div class="menu-nav">
            <button class="menu-btn active" data-menu="all">📚 Semua Anime</button>
            <button class="menu-btn" data-menu="popular">🔥 Populer</button>
            <button class="menu-btn" data-menu="new">✨ Terbaru</button>
        </div>

        <div class="content" id="content"></div>

        <div class="footer">🌿 vibnime · jelajahi dunia anime 🌿</div>
    </div>

    <script>
        // Database dengan URL gambar anime asli dari CDN
        const animeData = {
            A: [
                { 
                    title: 'Attack on Titan', 
                    chars: [
                        { name: 'Eren Yeager', img: 'https://cdn.myanimelist.net/images/characters/10/408448.jpg' },
                        { name: 'Mikasa Ackerman', img: 'https://cdn.myanimelist.net/images/characters/11/414919.jpg' },
                        { name: 'Levi Ackerman', img: 'https://cdn.myanimelist.net/images/characters/15/401137.jpg' },
                        { name: 'Armin Arlert', img: 'https://cdn.myanimelist.net/images/characters/9/406639.jpg' }
                    ] 
                },
                { 
                    title: 'Angel Beats!', 
                    chars: [
                        { name: 'Yuzuru Otonashi', img: 'https://cdn.myanimelist.net/images/characters/7/282787.jpg' },
                        { name: 'Kanade Tachibana', img: 'https://cdn.myanimelist.net/images/characters/9/141469.jpg' }
                    ] 
                }
            ],
            B: [
                { 
                    title: 'Bleach', 
                    chars: [
                        { name: 'Ichigo Kurosaki', img: 'https://cdn.myanimelist.net/images/characters/2/300635.jpg' },
                        { name: 'Rukia Kuchiki', img: 'https://cdn.myanimelist.net/images/characters/9/83149.jpg' }
                    ] 
                }
            ],
            D: [
                { 
                    title: 'Demon Slayer', 
                    chars: [
                        { name: 'Tanjiro Kamado', img: 'https://cdn.myanimelist.net/images/characters/4/414919.jpg' },
                        { name: 'Nezuko Kamado', img: 'https://cdn.myanimelist.net/images/characters/7/414917.jpg' },
                        { name: 'Zenitsu', img: 'https://cdn.myanimelist.net/images/characters/11/419419.jpg' }
                    ] 
                }
            ],
            J: [
                { 
                    title: 'Jujutsu Kaisen', 
                    chars: [
                        { name: 'Yuji Itadori', img: 'https://cdn.myanimelist.net/images/characters/16/448446.jpg' },
                        { name: 'Gojo Satoru', img: 'https://cdn.myanimelist.net/images/characters/8/445562.jpg' },
                        { name: 'Megumi Fushiguro', img: 'https://cdn.myanimelist.net/images/characters/5/445561.jpg' }
                    ] 
                }
            ],
            N: [
                { 
                    title: 'Naruto', 
                    chars: [
                        { name: 'Naruto Uzumaki', img: 'https://cdn.myanimelist.net/images/characters/2/284942.jpg' },
                        { name: 'Sasuke Uchiha', img: 'https://cdn.myanimelist.net/images/characters/9/284961.jpg' },
                        { name: 'Sakura Haruno', img: 'https://cdn.myanimelist.net/images/characters/8/284955.jpg' },
                        { name: 'Kakashi Hatake', img: 'https://cdn.myanimelist.net/images/characters/4/284959.jpg' }
                    ] 
                }
            ],
            O: [
                { 
                    title: 'One Piece', 
                    chars: [
                        { name: 'Monkey D. Luffy', img: 'https://cdn.myanimelist.net/images/characters/15/291127.jpg' },
                        { name: 'Roronoa Zoro', img: 'https://cdn.myanimelist.net/images/characters/5/291128.jpg' },
                        { name: 'Nami', img: 'https://cdn.myanimelist.net/images/characters/7/291132.jpg' },
                        { name: 'Sanji', img: 'https://cdn.myanimelist.net/images/characters/8/291131.jpg' }
                    ] 
                },
                { 
                    title: 'One Punch Man', 
                    chars: [
                        { name: 'Saitama', img: 'https://cdn.myanimelist.net/images/characters/6/297599.jpg' },
                        { name: 'Genos', img: 'https://cdn.myanimelist.net/images/characters/11/297601.jpg' }
                    ] 
                }
            ],
            S: [
                { 
                    title: 'Spy x Family', 
                    chars: [
                        { name: 'Anya Forger', img: 'https://cdn.myanimelist.net/images/characters/14/485248.jpg' },
                        { name: 'Loid Forger', img: 'https://cdn.myanimelist.net/images/characters/12/485247.jpg' },
                        { name: 'Yor Forger', img: 'https://cdn.myanimelist.net/images/characters/2/485249.jpg' }
                    ] 
                }
            ]
        };

        // Fungsi untuk generate URL gambar fallback (pakai UI Avatars sebagai cadangan)
        function getImageURL(charName, charImg) {
            // Cek apakah URL gambar valid (dari CDN)
            if (charImg && charImg.startsWith('http')) {
                return charImg;
            }
            // Fallback ke UI Avatars dengan nama karakter
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(charName)}&size=200&background=ff9800&color=fff&bold=true&format=png`;
        }

        const content = document.getElementById('content');
        const alphabetNav = document.getElementById('alphabetNav');
        let currentLetter = null;

        function createAlphabetNav() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            alphabetNav.innerHTML = letters.map(letter =>
                `<button class="letter-btn" data-letter="${letter}">${letter}</button>`
            ).join('');

            alphabetNav.addEventListener('click', (e) => {
                if (e.target.classList.contains('letter-btn')) {
                    const letter = e.target.dataset.letter;
                    document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentLetter = letter;
                    renderAnimeList(letter);
                    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                }
            });
        }

        function renderAnimeList(letter) {
            const animes = animeData[letter] || [];
            if (animes.length === 0) {
                content.innerHTML = `<p style="color:white; text-align:center; padding: 30px;">😢 Tidak ada anime untuk huruf <b>${letter}</b></p>`;
                return;
            }

            let html = `<div class="section-title">📺 Anime Awalan "${letter}"</div>`;
            html += `<div class="anime-list">`;
            animes.forEach((anime, idx) => {
                html += `<button class="anime-btn" data-letter="${letter}" data-idx="${idx}">▶ ${anime.title}</button>`;
            });
            html += `</div>`;
            html += `<div id="charactersContainer"></div>`;
            content.innerHTML = html;

            document.querySelectorAll('.anime-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const l = this.dataset.letter;
                    const i = parseInt(this.dataset.idx);
                    const anime = animeData[l][i];
                    showCharacters(anime);
                });
            });
        }

        function renderAllAnime() {
            let html = '';
            for (let letter of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ') {
                const animes = animeData[letter] || [];
                if (animes.length > 0) {
                    html += `<div class="section-title" style="margin-top:15px;">📌 ${letter}</div><div class="anime-list">`;
                    animes.forEach((anime, idx) => {
                        html += `<button class="anime-btn" data-letter="${letter}" data-idx="${idx}">▶ ${anime.title}</button>`;
                    });
                    html += `</div>`;
                }
            }
            html += `<div id="charactersContainer"></div>`;
            content.innerHTML = html;

            document.querySelectorAll('.anime-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const l = this.dataset.letter;
                    const i = parseInt(this.dataset.idx);
                    const anime = animeData[l][i];
                    showCharacters(anime);
                });
            });
        }

        function showCharacters(anime) {
            const container = document.getElementById('charactersContainer');
            if (!container) return;

            container.style.opacity = '0';
            container.style.transition = 'opacity 0.3s';

            setTimeout(() => {
                container.innerHTML = `
                    <div class="characters-title">👥 Karakter dari "${anime.title}"</div>
                    <div class="character-grid">
                        ${anime.chars.map(char => `
                            <div class="character-card">
                                <img class="character-img" 
                                     src="${getImageURL(char.name, char.img)}" 
                                     alt="${char.name}"
                                     loading="lazy"
                                     onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(char.name)}&size=200&background=ff9800&color=fff&bold=true'">
                                <div class="character-name">${char.name}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.style.opacity = '1';
                container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 200);
        }

        // Menu buttons
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
                currentLetter = null;

                const menu = this.dataset.menu;
                if (menu === 'all') renderAllAnime();
                else if (menu === 'popular') renderAnimeList('N');
                else if (menu === 'new') renderAnimeList('S');
            });
        });

        // Init
        createAlphabetNav();
        renderAllAnime();
    </script>
</body>
</html>
